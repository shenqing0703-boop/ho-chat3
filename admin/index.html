<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>客服管理后台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>
</head>
<body>
    <div id="list" style="width:200px; float:left; border-right:1px solid #ccc;"></div>
    <div style="margin-left:210px;">
        <div id="msgs" style="height:400px; border:1px solid #ddd;"></div>
        <input type="text" id="in"><button onclick="reply()">回复</button>
    </div>
    <script>
        const config = { databaseURL: "https://chat-system-87d17-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let cur = "test_user_001"; // 对应前台的 ID

        // 监听所有聊天列表
        db.ref("chats3").on("value", s => {
            document.getElementById("list").innerHTML = "";
            s.forEach(u => {
                const b = document.createElement("button"); b.innerText = u.key;
                b.onclick = () => { cur = u.key; load(); };
                document.getElementById("list").appendChild(b);
            });
        });

        function load() {
            document.getElementById("msgs").innerHTML = "";
            db.ref("chats3/"+cur+"/messages").on("child_added", s => {
                const m = s.val();
                document.getElementById("msgs").innerHTML += `<div>${m.sender}: ${m.text}</div>`;
            });
        }
        
        function reply() {
            const txt = document.getElementById("in").value;
            db.ref("chats3/"+cur+"/messages").push({sender: "admin", text: txt, timestamp: Date.now()});
            document.getElementById("in").value = "";
        }
        load(); // 默认加载这个 test_user_001
    </script>
</body>
</html>
