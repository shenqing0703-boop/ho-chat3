<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>客服管理后台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: -apple-system, sans-serif; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #eee; overflow-y: auto; }
        .sidebar-header { padding: 15px; background: #fafafa; font-weight: bold; text-align: center; color: #00a854; border-bottom: 1px solid #eee; }
        .chat-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; }
        .main { flex: 1; display: flex; flex-direction: column; background: #f5f5f5; }
        .main-header { padding: 15px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; background: url("https://ho-chat3.pages.dev/logo.webp") no-repeat center/contain; margin-right: 10px; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; }
        .input-area { padding: 20px; background: #fff; display: flex; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">HO体育 接待大厅</div>
        <div id="list"></div>
    </div>
    <div class="main">
        <div class="main-header"><div class="avatar"></div>客服接待室</div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:5px;">
            <button onclick="sendText()" style="padding:0 20px; background:#00a854; color:#fff; border:none; margin-left:10px; cursor:pointer;">发送</button>
        </div>
    </div>
    <script>
        const config = { databaseURL: "https://chat-system-87d17-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let cur = "";

        db.ref("chats3").on("value", s => {
            const list = document.getElementById("list"); list.innerHTML = "";
            s.forEach(u => {
                const div = document.createElement("div"); div.className = "chat-item";
                div.innerHTML = `<div>${u.key}</div>`;
                div.onclick = () => { cur = u.key; load(); };
                list.appendChild(div);
            });
        });

        function load() {
            document.getElementById("messages").innerHTML = "";
            db.ref("chats3/"+cur+"/messages").on("child_added", s => {
                const m = s.val();
                document.getElementById("messages").innerHTML += `<div>${m.sender}: ${m.type==='image'?'[图片]':m.text}</div>`;
            });
        }

        function sendText() {
            const txt = document.getElementById("msg-input").value;
            db.ref("chats3/"+cur+"/messages").push({sender: "admin", text: txt, timestamp: Date.now()});
            document.getElementById("msg-input").value = "";
        }
    </script>
</body>
</html>
