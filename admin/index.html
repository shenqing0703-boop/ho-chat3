<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>客服管理后台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; background: #f0f2f5; }
        .sidebar { width: 250px; background: #fff; overflow-y: auto; border-right: 1px solid #ddd; }
        .main { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: #eee; }
        .msg { margin-bottom: 10px; }
        .input-area { padding: 20px; background: #fff; display: flex; }
    </style>
</head>
<body>
    <div class="sidebar" id="list">加载中...</div>
    <div class="main">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" style="flex:1">
            <button onclick="sendText()">发送</button>
        </div>
    </div>
    <script>
        var db, currentChat;
        window.onload = function() {
            const firebaseConfig = { databaseURL: "https://chat-system-87d17-default-rtdb.firebaseio.com/" };
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            db.ref("chats3").on("value", snap => {
                const list = document.getElementById("list"); list.innerHTML = "";
                snap.forEach(s => {
                    const div = document.createElement("div"); div.innerText = s.key;
                    div.onclick = () => { currentChat = s.key; loadChat(); };
                    list.appendChild(div);
                });
            });
        };
        function loadChat() {
            const box = document.getElementById("messages"); box.innerHTML = "";
            db.ref("chats3/" + currentChat + "/messages").on("child_added", snap => {
                const msg = snap.val();
                const div = document.createElement("div");
                div.className = "msg"; div.innerText = (msg.sender === "admin" ? "我: " : "粉丝: ") + msg.text;
                box.appendChild(div);
            });
        }
        function sendText() {
            const text = document.getElementById("msg-input").value;
            db.ref("chats3/" + currentChat + "/messages").push({ sender: "admin", text: text, timestamp: Date.now() });
            document.getElementById("msg-input").value = "";
        }
    </script>
</body>
</html>
