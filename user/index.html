<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HO体育客服官方线路</title>
    <link id="web-icon" rel="shortcut icon" type="image/x-icon" href="https://ho-chat3.pages.dev/logo.webp">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #eaeaea; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; }
        .chat-container { width: 100%; max-width: 500px; height: 100%; background: #eaeaea; display: flex; flex-direction: column; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.08); }
        .chat-header { background: linear-gradient(180deg, #00b85c 0%, #00a854 100%); color: #ffffff; padding: 14px 20px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; flex-shrink: 0; gap: 10px; z-index: 10; }
        .header-logo { width: 30px; height: 30px; border-radius: 50%; background-color: #ffffff; background-image: url("https://ho-chat3.pages.dev/logo.webp"); background-size: 78%; background-position: center; background-repeat: no-repeat; flex-shrink: 0; }
        #messages { flex: 1; padding: 18px 14px; overflow-y: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        .msg-row { display: flex; margin-bottom: 16px; width: 100%; align-items: flex-start; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.admin { justify-content: flex-start; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: bold; background-size: contain; background-position: center; background-repeat: no-repeat; }
        .user .avatar { background-color: #00bac7; margin-left: 10px; } 
        .admin .avatar { background-color: #ffffff; border: 1px solid rgba(0,0,0,0.05); background-image: url("https://ho-chat3.pages.dev/logo.webp"); background-size: 82%; margin-right: 10px; } 
        .bubble-name { font-size: 11px; color: #777; margin-left: 52px; margin-bottom: 3px; text-align: left; }
        .bubble { max-width: calc(100% - 106px); padding: 11px 15px; border-radius: 14px; font-size: 15px; line-height: 1.45; word-break: break-all; box-shadow: 0 2px 5px rgba(0,0,0,0.04); }
        .user .bubble { background: #95ec69; color: #000; border-top-right-radius: 2px; }
        .admin .bubble { background: #ffffff; color: #000; border-top-left-radius: 2px; border: 1px solid rgba(0,0,0,0.02); }
        .bubble img { max-width: 100%; max-height: 260px; border-radius: 10px; margin-top: 2px; display: block; object-fit: contain; }
        .input-area { display: flex; align-items: center; padding: 10px 14px; background: #f6f6f6; border-top: 1px solid #dcdcdb; flex-shrink: 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); gap: 8px; }
        .btn-file { background: #ffffff; border: 1px solid #d3d3d2; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; flex-shrink: 0; }
        #msg-input { flex: 1; height: 38px; padding: 0 14px; border: 1px solid #d3d3d2; border-radius: 19px; outline: none; font-size: 15px; background: #fff; }
        .btn-send { background: #00a854; color: white; border: none; height: 38px; padding: 0 18px; border-radius: 19px; font-size: 14px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header"><div class="header-logo"></div><span>HO体育客服官方线路</span></div>
    <div id="messages"></div>
    <div class="input-area">
        <label class="btn-file" for="file-input">📎</label>
        <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="uploadFile(this)">
        <input type="text" id="msg-input" placeholder="请输入您的问题..." onkeydown="if(event.keyCode==13) sendText()">
        <button class="btn-send" onclick="sendText()">发送</button>
    </div>
</div>
<script>
    var db; 
    let userId = localStorage.getItem("chat_user_id3") || "粉丝_" + Math.random().toString(16).substring(2, 6); 
    localStorage.setItem("chat_user_id3", userId);
    
    const welcomeFirst = "您好，很高兴为您服务，有什么可以为您效劳的？";
    const welcomeText = "欢迎来到HO体育！我是您的专属客服小樱。HO精选推荐每日更新，获取最新顶级联赛高清直播、实时主场动态及福利，人工客服正在火速赶到，你可以先描述你的问题。"; 
    var hasAdminReplied = false; 

    window.onload = function() {
        const firebaseConfig = { databaseURL: "https://chat-system-87d17-default-rtdb.firebaseio.com/" };
        if (typeof firebase !== 'undefined') { 
            if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); } 
            firebase.database().goOffline(); firebase.database().goOnline();
            db = firebase.database(); 
            initChat(); 
        }
    };

    function initChat() {
        const box = document.getElementById("messages");
        db.ref("chats3/" + userId + "/messages").on("child_added", snap => {
            const msg = snap.val(); 
            if (msg.sender === "admin" && msg.text !== welcomeFirst && msg.text !== welcomeText) { hasAdminReplied = true; }
            
            const container = document.createElement("div"); 
            container.style.width = "100%"; container.style.marginBottom = "15px";
            let content = msg.type === "image" ? `<img src="${msg.url}" />` : msg.text;

            if (msg.sender === "user") { 
                container.innerHTML = `<div class="msg-row user"><div class="bubble">${content}</div><div class="avatar">我</div></div>`; 
            } else { 
                container.innerHTML = `<div class="bubble-name">HO体育-客服小樱</div><div class="msg-row admin"><div class="avatar"></div><div class="bubble">${content}</div></div>`; 
            }
            box.appendChild(container); 
            box.scrollTop = box.scrollHeight;
        });
        checkAndTriggerFirstWelcome();
    }

    function sendText() { 
        const input = document.getElementById("msg-input"); 
        const text = input.value.trim(); 
        if (!text || !db) return; 
        db.ref("chats3/" + userId + "/messages").push({ sender: "user", type: "text", text: text, timestamp: Date.now() });
        db.ref("chats3/" + userId + "/info").set({ lastMsg: text, timestamp: Date.now() });
        input.value = ""; 
    }

    function checkAndTriggerFirstWelcome() {
        db.ref("chats3/" + userId + "/messages").once("value", snap => {
            if (!snap.exists()) {
                setTimeout(() => {
                    db.ref("chats3/" + userId + "/messages").push({ sender: "admin", type: "text", text: welcomeFirst, timestamp: Date.now() });
                    db.ref("chats3/" + userId + "/info").set({ lastMsg: "小樱: " + welcomeFirst, timestamp: Date.now() });
                    setTimeout(() => {
                        if (hasAdminReplied) return; 
                        db.ref("chats3/" + userId + "/messages").push({ sender: "admin", type: "text", text: welcomeText, timestamp: Date.now() }); 
                        db.ref("chats3/" + userId + "/info").set({ lastMsg: "小樱: " + welcomeText, timestamp: Date.now() });
                    }, 20000);
                }, 500);
            }
        });
    }

    function uploadFile(input) { const file = input.files[0]; if (!file || !db) return; const inputField = document.getElementById("msg-input"); inputField.placeholder = "正在加密传输图像..."; inputField.disabled = true; const reader = new FileReader(); reader.onload = function(e) { inputField.placeholder = "请输入您的问题..."; inputField.disabled = false; db.ref("chats3/" + userId + "/messages").push({ sender: "user", type: "image", url: e.target.result, timestamp: Date.now() }); db.ref("chats3/" + userId + "/info").set({ lastMsg: "[图片]", timestamp: Date.now() }); }; reader.readAsDataURL(file); }
</script>
</body>
</html>
