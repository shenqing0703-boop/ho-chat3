<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HO体育客服官方线路</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>
    <link rel="stylesheet" href="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/photoswipe/4.1.3/photoswipe.min.css">
    <link rel="stylesheet" href="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/photoswipe/4.1.3/default-skin/default-skin.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; background: #eaeaea; font-family: sans-serif; }
        .chat-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; background: #fff; }
        .chat-header { background: #00a854; color: #fff; padding: 15px; text-align: center; font-weight: bold; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; background: #eaeaea; }
        .msg-row { display: flex; margin-bottom: 15px; }
        .user { justify-content: flex-end; }
        .bubble { padding: 10px; border-radius: 8px; background: #fff; max-width: 70%; }
        .user .bubble { background: #95ec69; }
        .input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; background: #f6f6f6; }
        #msg-input { flex: 1; height: 40px; padding: 0 10px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-send { background: #00a854; color: white; border: none; padding: 0 15px; margin-left: 8px; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">HO体育客服</div>
    <div id="messages"></div>
    <div class="input-area">
        <label for="file-input" style="font-size:24px; cursor:pointer;">📎</label>
        <input type="file" id="file-input" style="display:none;" onchange="uploadFile(this)">
        <input type="text" id="msg-input">
        <button class="btn-send" onclick="sendText()">发送</button>
    </div>
</div>
<script>
    const config = { databaseURL: "https://chat-system-87d17-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();
    const uid = localStorage.uid || (localStorage.uid = "user_" + Math.random().toString(36).substr(2, 5));
    
    db.ref("chats3/" + uid + "/messages").on("child_added", s => {
        const m = s.val();
        const box = document.getElementById("messages");
        box.innerHTML += `<div class="msg-row ${m.sender === 'user'?'user':'admin'}"><div class="bubble">${m.type==='image'?`<img src="${m.url}" style="width:100%"/>`:m.text}</div></div>`;
        box.scrollTop = box.scrollHeight;
    });

    function pushMsg(data) {
        db.ref("chats3/" + uid + "/messages").push(data);
        db.ref("chats3/" + uid + "/info").set({ lastMsg: data.text || "[图片]", timestamp: Date.now() });
    }

    function sendText() {
        const input = document.getElementById("msg-input");
        if (!input.value) return;
        pushMsg({ sender: "user", type: "text", text: input.value, timestamp: Date.now() });
        input.value = "";
    }

    function uploadFile(input) {
        const reader = new FileReader();
        reader.onload = (e) => pushMsg({ sender: "user", type: "image", url: e.target.result, timestamp: Date.now() });
        reader.readAsDataURL(input.files[0]);
    }
</script>
</body>
</html>
