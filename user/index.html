<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HO体育客服官方线路</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>
    <style>
        body { margin:0; background:#eaeaea; font-family:sans-serif; }
        .box { max-width:500px; margin:0 auto; height:100vh; display:flex; flex-direction:column; background:#fff; }
        #msgs { flex:1; overflow-y:auto; padding:15px; }
        .input-area { padding:10px; border-top:1px solid #ddd; display:flex; }
        #in { flex:1; padding:10px; }
    </style>
</head>
<body>
<div class="box">
    <div style="background:#00a854; color:#fff; padding:15px; text-align:center;">HO体育客服</div>
    <div id="msgs"></div>
    <div class="input-area">
        <input type="text" id="in"><button onclick="send()">发送</button>
    </div>
</div>
<script>
    const config = { databaseURL: "https://chat-system-87d17-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();
    // 强制使用固定的测试ID，方便你在后台看数据
    const uid = "test_user_001";
    
    db.ref("chats3/" + uid + "/messages").on("child_added", s => {
        const m = s.val();
        document.getElementById("msgs").innerHTML += `<div>${m.sender}: ${m.text}</div>`;
    });

    function send() {
        const val = document.getElementById("in").value;
        if (!val) return;
        db.ref("chats3/" + uid + "/messages").push({sender: "user", text: val, timestamp: Date.now()});
        db.ref("chats3/" + uid + "/info").set({lastMsg: val, timestamp: Date.now()});
        document.getElementById("in").value = "";
    }
</script>
</body>
</html>
