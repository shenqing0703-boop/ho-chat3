<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>客服</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>
</head>
<body>
    <div id="messages" style="height:300px; overflow-y:scroll; border:1px solid #ccc;"></div>
    <input type="text" id="msg-input">
    <button onclick="sendMessage()">发送</button>
    <script>
        const config = { databaseURL: "https://chat-system-87d17-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();
        const uid = localStorage.uid || (localStorage.uid = "user_" + Math.random().toString(36).substr(2, 5));
        
        db.ref("chats3/" + uid + "/messages").on("child_added", s => {
            const m = s.val();
            document.getElementById("messages").innerHTML += `<div>${m.sender}: ${m.text}</div>`;
        });
        
        function sendMessage() {
            const input = document.getElementById("msg-input");
            if (!input.value) return;
            db.ref("chats3/" + uid + "/messages").push({sender: "user", text: input.value, time: Date.now()});
            input.value = "";
        }
    </script>
</body>
</html>
